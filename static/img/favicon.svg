<?xml version="1.0" encoding="UTF-8"?>
<!-- TunaOS favicon — works at 16×16, 32×32 and 48×48 -->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a2e44"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4c75"/>
      <stop offset="60%" stop-color="#1e90ff"/>
      <stop offset="100%" stop-color="#63b3f7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Tail fork -->
  <path d="M 3 16 L 7 10 L 9 16 L 7 22 Z" fill="#0f4c75"/>

  <!-- Body -->
  <ellipse cx="18" cy="16" rx="11" ry="7" fill="url(#body)"/>

  <!-- Belly sheen -->
  <ellipse cx="18" cy="18" rx="9" ry="4" fill="#e8f4fd" opacity="0.25"/>

  <!-- Dorsal fin -->
  <path d="M 13 9 L 18 5 L 23 9" fill="#0a3d62"/>

  <!-- Head -->
  <ellipse cx="26" cy="16" rx="4" ry="6" fill="#0f4c75"/>

  <!-- Eye -->
  <circle cx="27" cy="14" r="2" fill="#000a14"/>
  <circle cx="27" cy="14" r="1.2" fill="#1e90ff" opacity="0.9"/>
  <circle cx="27.6" cy="13.4" r="0.5" fill="#fff" opacity="0.9"/>

  <!-- Lateral stripe -->
  <path d="M 7 14 Q 16 13 26 15" fill="none" stroke="#63b3f7" stroke-width="1" opacity="0.5"/>
</svg>