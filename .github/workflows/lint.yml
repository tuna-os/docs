name: Lint

on:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/lint.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: |
          markdownlint 'docs/**/*.md' '*.md' \
            --ignore docs/docs/tacklebox \
            --disable MD013 MD033 MD041 || \
            echo "NOTE: markdownlint found issues — review and fix"

  # Check for broken internal links using a lightweight markdown link checker
  js-syntax:
    name: Node.js Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Check Node.js script syntax
        run: |
          echo "=== Checking Node.js scripts ==="
          FAILED=0
          for f in scripts/*.mjs scripts/*.js; do
            [[ -f "$f" ]] || continue
            # Skip test files in syntax check (they import from production scripts)
            [[ "$f" == *.test.mjs ]] && continue
            echo "  Checking: $f"
            if ! node --check "$f" 2>/dev/null; then
              echo "    FAILED"
              FAILED=1
            else
              echo "    OK"
            fi
          done
          exit $FAILED

      - name: Run ISO index builder tests
        run: node scripts/build-iso-index.test.mjs

  link-check:
    name: Internal Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for broken internal references
        run: |
          echo "=== Checking internal .md links ==="
          ERRORS=0
          for f in $(find docs -name '*.md' -type f); do
            while IFS= read -r link; do
              target=$(echo "$link" | sed -n 's/.*\[.*\](\([^)]*\.md\(#[^)]*\)*\)).*/\1/p')
              [ -z "$target" ] && continue
              target_file="${target%%#*}"
              echo "$target" | grep -qE '^https?://' && continue
              if [ ! -f "$(dirname "$f")/$target_file" ] && [ ! -f "$target_file" ]; then
                echo "  BROKEN: $f -> $target"
                ERRORS=$((ERRORS + 1))
              fi
            done < <(grep -oP '\[.*?\]\([^)]+\.md(#[^)]*)?\)' "$f" 2>/dev/null || true)
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS broken internal links"
          else
            echo "No broken internal links found"
          fi

      - name: Test summary
        if: always()
        run: |
          echo "## Lint Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Markdown Lint | completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node.js Syntax | completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Internal Link Check | completed |" >> "$GITHUB_STEP_SUMMARY"
