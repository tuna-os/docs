# Syncs developer docs from the tunaOS source repo on a schedule and
# opens a PR if any content changed. The source repo is the single source
# of truth — docs are authored alongside the code they document.
#
# On change, the PR's CI run validates the site build, so broken docs
# cannot ship to production.

name: sync-dev-docs

on:
  schedule:
    # Daily — frequent enough to catch doc updates within a day.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Forks won't have write access; skip rather than fail.
    if: ${{ github.repository == 'tuna-os/docs' }}
    steps:
      - uses: actions/checkout@3d147700e9102d63eab6c121c870aa6e0af9396b # v4

      - uses: actions/setup-node@cd93095a6e160be2cc06e0158b140f5f8aa19670 # v4
        with:
          node-version: 20

      - name: Sync developer docs from tunaOS repo
        run: node scripts/sync-dev-docs.mjs

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff1f # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync developer docs from tuna-os/tunaOS'
          title: 'chore: sync developer docs from tuna-os/tunaOS'
          body: |
            Automated sync from `tuna-os/tunaOS/docs/book/src/`.
            Review for content accuracy before merging.
          branch: automation/sync-dev-docs
          delete-branch: true
          labels: documentation
