# Deploys to Cloudflare Pages when flatpak index files change.
# Also runs on workflow_dispatch for manual triggers.

name: Deploy Flatpak Index

on:
  push:
    branches: [main]
    paths:
      - 'static/flatpak/**'
  workflow_dispatch:

concurrency:
  group: deploy-flatpak
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'tuna-os/docs' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy build --project-name tunaos-org --branch main
