# Deploys to Cloudflare Workers + Assets when flatpak index files change.
# Also runs on workflow_dispatch for manual triggers.

name: Deploy Flatpak Index

on:
  push:
    branches: [main]
    paths:
      - 'static/flatpak/**'
  workflow_dispatch:

concurrency:
  group: deploy-flatpak
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'tuna-os/docs' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the site
        run: npm run build

      - name: Install Wrangler
        run: npm install -g wrangler@4

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: be6724e409f2877081ad17eb20e94563
        run: wrangler deploy
